<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.7; max-width: 860px; margin: 0 auto; padding: 24px 20px; color: #24292e; }
    a { color: #0366d6; text-decoration: none; }
    a:hover { text-decoration: underline; }
    h1, h2, h3, h4 { line-height: 1.3; margin-top: 2rem; margin-bottom: 0.75rem; }
    h1 { font-size: 1.75rem; margin-top: 0; }
    h2 { font-size: 1.4rem; border-bottom: 1px solid #eaecef; padding-bottom: 0.3rem; }
    h3 { font-size: 1.1rem; }
    p { margin: 0.75rem 0; }
    code { background: #f1f2f4; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; }
    pre { background: #1e1e1e; color: #d4d4d4; padding: 16px; border-radius: 6px; overflow-x: auto; margin: 1rem 0; }
    pre code { background: transparent; padding: 0; color: inherit; font-size: 0.875rem; }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
    th, td { border: 1px solid #dfe2e5; padding: 8px 14px; text-align: left; }
    th { background: #f6f8fa; font-weight: 600; }
    tr:nth-child(even) { background: #fafbfc; }
    img { max-width: 100%; }
    hr { border: none; border-top: 1px solid #eaecef; margin: 2rem 0; }
    .nav { margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid #eaecef; }
    .nav a { margin-right: 1.25rem; color: #586069; }
    .nav a:hover { color: #0366d6; text-decoration: none; }
    .content { display: flex; gap: 2.5rem; }
    .content main { flex: 1; min-width: 0; }
    .content aside { min-width: 160px; }
    @media (max-width: 700px) { .content { flex-direction: column; } aside { order: -1; } }
    footer { margin-top: 3rem; padding-top: 1.25rem; border-top: 1px solid #eaecef; color: #586069; font-size: 0.875rem; }
    blockquote { border-left: 4px solid #dfe2e5; padding-left: 1rem; margin: 1rem 0; color: #586069; }
    .sidebar { background: #f6f8fa; padding: 1rem 1.25rem; border-radius: 6px; margin-bottom: 1rem; }
    .sidebar h3 { margin-top: 0; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; color: #586069; }
    .sidebar ul { list-style: none; padding-left: 0; margin: 0; }
    .sidebar li { margin-bottom: 0.4rem; }
    .sidebar li a { color: #0366d6; }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="{{ site.baseurl }}/">Home</a>
    <a href="{{ site.baseurl }}/docs/getting-started.html">Docs</a>
    <a href="{{ site.github.repository_url }}">GitHub</a>
  </nav>
  <div class="content">
    <main>
      {{ content }}
    </main>
    <aside>
      {% include sidebar.html %}
    </aside>
  </div>
  <footer>
    <a href="{{ site.github.repository_url }}">RoastIQ on GitHub</a> · MIT License
  </footer>
</body>
</html>
