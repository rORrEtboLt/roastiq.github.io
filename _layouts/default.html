<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.6; max-width: 900px; margin: 0 auto; padding: 20px; }
    a { color: #0366d6; text-decoration: none; }
    a:hover { text-decoration: underline; }
    code { background: #f6f8fa; padding: 2px 6px; border-radius: 3px; font-size: 0.9em; }
    pre { background: #f6f8fa; padding: 16px; border-radius: 6px; overflow-x: auto; }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
    th, td { border: 1px solid #dfe2e5; padding: 8px 12px; text-align: left; }
    th { background: #f6f8fa; }
    img { max-width: 100%; }
    .nav { margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid #e1e4e8; }
    .nav a { margin-right: 1rem; }
    .content { display: flex; gap: 2rem; }
    .content main { flex: 1; }
    .content aside { min-width: 180px; }
    @media (max-width: 700px) { .content { flex-direction: column; } }
    footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid #e1e4e8; color: #586069; font-size: 0.9rem; }
    blockquote { border-left: 4px solid #dfe2e5; padding-left: 1rem; margin-left: 0; color: #586069; }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="{{ site.baseurl }}/">Home</a>
    <a href="{{ site.baseurl }}/docs/">Docs</a>
    <a href="{{ site.github.repository_url }}">GitHub</a>
  </nav>
  {{ content }}
  <footer>
    <a href="{{ site.github.repository_url }}">RoastIQ on GitHub</a> · MIT License
  </footer>
</body>
</html>
