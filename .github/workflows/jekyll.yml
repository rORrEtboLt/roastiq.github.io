name: Jekyll site CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  github-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
      - run: gem install jekyll bundler
      - run: bundle install
      - run: bundle exec jekyll build --trace
        env:
          JEKYLL_ENV: production
      - run: cp CNAME _site/CNAME 2>/dev/null || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site/
